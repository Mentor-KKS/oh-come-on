<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>OH COME ON! — Level Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: #ccc; font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }

        #sidebar { width: 320px; background: #1a1a2e; border-right: 2px solid #333; display: flex; flex-direction: column; overflow-y: auto; }
        #sidebar h3 { color: #2ecc71; padding: 8px 12px; border-bottom: 1px solid #333; font-size: 13px; cursor: pointer; user-select: none; }
        #sidebar h3:hover { background: #252540; }
        .panel { padding: 8px 12px; border-bottom: 1px solid #222; }
        .panel.collapsed .panel-body { display: none; }
        .panel-body { padding-top: 6px; }

        .row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
        .row label { width: 90px; font-size: 11px; color: #888; flex-shrink: 0; }
        .row input[type="number"], .row select { background: #0a0a15; color: #fff; border: 1px solid #444; padding: 3px 6px; font-family: inherit; font-size: 12px; width: 70px; }
        .row input[type="number"]:focus { border-color: #2ecc71; outline: none; }
        .row select { width: 100%; }

        button { background: #2a2a4a; color: #ccc; border: 1px solid #555; padding: 5px 10px; font-family: inherit; font-size: 11px; cursor: pointer; border-radius: 3px; }
        button:hover { background: #3a3a6a; color: #fff; }
        button.active { background: #2ecc71; color: #000; border-color: #2ecc71; }
        button.danger { background: #8b0000; border-color: #e74c3c; }
        button.danger:hover { background: #e74c3c; color: #fff; }

        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #toolbar { background: #1a1a2e; padding: 8px 15px; display: flex; gap: 10px; align-items: center; width: 100%; border-bottom: 2px solid #333; flex-wrap: wrap; }
        #toolbar label { font-size: 12px; color: #888; }
        #toolbar select { background: #0a0a15; color: #fff; border: 1px solid #444; padding: 4px 8px; font-family: inherit; }

        #canvasWrap { position: relative; margin: 15px; }
        canvas { background: #2a2a4a; border: 2px solid #444; cursor: crosshair; }
        #coords { position: absolute; bottom: -22px; left: 0; font-size: 11px; color: #666; }
        #info { position: absolute; top: -22px; right: 0; font-size: 11px; color: #666; }

        .tools { display: flex; gap: 4px; }

        #annotations { max-height: 200px; overflow-y: auto; }
        .anno-item { background: #0a0a15; padding: 4px 8px; margin: 3px 0; border-left: 3px solid #f1c40f; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .anno-item .del { color: #e74c3c; cursor: pointer; font-weight: bold; }

        #elements { max-height: 250px; overflow-y: auto; }
        .elem-item { padding: 3px 8px; font-size: 11px; cursor: pointer; border-left: 3px solid transparent; }
        .elem-item:hover { background: #252540; }
        .elem-item.selected { background: #2a2a5a; border-left-color: #2ecc71; }

        textarea { background: #0a0a15; color: #ccc; border: 1px solid #444; font-family: inherit; font-size: 11px; width: 100%; resize: vertical; padding: 4px; }
        textarea:focus { border-color: #2ecc71; outline: none; }

        .color-platform { color: #d0d0d0; }
        .color-spike { color: #e74c3c; }
        .color-trap { color: #f1c40f; }
        .color-exit { color: #2ecc71; }
    </style>
</head>
<body>
    <div id="sidebar">
        <!-- Level & Tool -->
        <div class="panel">
            <div class="panel-body">
                <div class="row">
                    <label>Level:</label>
                    <select id="levelSelect"></select>
                </div>
                <div class="row" style="margin-top:8px;">
                    <div class="tools">
                        <button id="toolSelect" class="active" onclick="setTool('select')">Select</button>
                        <button id="toolAdd" onclick="setTool('add')">Add</button>
                        <button id="toolMark" onclick="setTool('mark')">Mark</button>
                    </div>
                </div>
                <div class="row" id="addTypeRow" style="display:none;">
                    <label>Add Type:</label>
                    <select id="addType">

                            <option value="fakeFloor">FakeFloor</option>
                            <option value="dodgingPlatform">DodgingPlatform</option>
                            <option value="trollShaker">TrollShaker</option>
                            <option value="timedFloor">TimedFloor</option>
                            <option value="togglePlatform">TogglePlatform</option>
                            <option value="movingPlatform">MovingPlatform</option>
                            <option value="hiddenPlatform">HiddenPlatform</option>
                        </optgroup>
                        <optgroup label="Hazards">
                            <option value="fallingCeiling">FallingCeiling</option>
                            <option value="shootingSpike">ShootingSpike (hidden)</option>
                            <option value="shootingSpikeDisguised">ShootingSpike (disguised)</option>
                            <option value="fakeSpike">FakeSpike</option>
                            <option value="fakeExit">FakeExit</option>
                            <option value="killZone">KillZone</option>
                            <option value="risingDeath">RisingDeath</option>
                            <option value="chasingWall">ChasingWall</option>
                        </optgroup>
                        <optgroup label="Zones">
                            <option value="iceZone">IceZone</option>
                            <option value="windZone">WindZone</option>
                            <option value="invertZone">InvertZone</option>
                        </optgroup>
                        <optgroup label="Interactives">
                            <option value="switch">Switch</option>
                            <option value="movingExit">MovingExit</option>
                        </optgroup>
                    </select>
                </div>
            </div>
        </div>

        <!-- Properties -->
        <h3 onclick="togglePanel(this)">Properties</h3>
        <div class="panel" id="propsPanel">
            <div class="panel-body" id="propsBody">
                <div style="color:#555;font-size:11px;">Click an element to select</div>
            </div>
        </div>

        <!-- Elements -->
        <h3 onclick="togglePanel(this)">Elements</h3>
        <div class="panel" id="elemPanel">
            <div class="panel-body" id="elements"></div>
        </div>

        <!-- Physics -->
        <h3 onclick="togglePanel(this)">Physics</h3>
        <div class="panel" id="physPanel">
            <div class="panel-body">
                <div class="row"><label>Gravity:</label><input type="number" step="0.01" id="phGravity"></div>
                <div class="row"><label>Jump Force:</label><input type="number" step="0.1" id="phJump"></div>
                <div class="row"><label>Move Speed:</label><input type="number" step="0.1" id="phSpeed"></div>
                <div class="row"><label>Friction:</label><input type="number" step="0.01" id="phFriction"></div>
                <div class="row"><label>Ice Friction:</label><input type="number" step="0.001" id="phIceFric" value="0.99"></div>
                <div class="row"><label>Ice Accel x:</label><input type="number" step="0.01" id="phIceAccel" value="0.15"></div>
                <div class="row"><label>Ice Max Spd x:</label><input type="number" step="0.1" id="phIceSpd" value="2.5"></div>
                <div class="row">
                    <label>Jump Arc:</label>
                    <button id="btnArc" onclick="toggleJumpArc()">Show</button>
                </div>
            </div>
        </div>

        <!-- Annotations -->
        <h3 onclick="togglePanel(this)">Annotations / Notes</h3>
        <div class="panel" id="annoPanel">
            <div class="panel-body">
                <div id="annotations"></div>
                <textarea id="exportNotes" rows="4" placeholder="Notes for this level..."></textarea>
            </div>
        </div>

        <!-- Variants -->
        <h3 onclick="togglePanel(this)">Level Variants</h3>
        <div class="panel" id="varPanel">
            <div class="panel-body">
                <button onclick="saveVariant()" style="width:100%;margin-bottom:6px;">Save Current as Variant</button>
                <div id="variantList"><div style="color:#555;font-size:11px;">No saved variants</div></div>
            </div>
        </div>

        <!-- Export -->
        <div class="panel" style="margin-top:auto; border-top:2px solid #333;">
            <div class="panel-body">
                <button onclick="testLevel()" style="width:100%;padding:10px;font-size:14px;background:#2ecc71;color:#000;font-weight:bold;border-color:#27ae60;">&#9654; Test Level</button>
                <button onclick="exportCode()" style="width:100%;padding:8px;font-size:13px;margin-top:5px;">Copy Level Code</button>
                <button onclick="exportAnnotations()" style="width:100%;padding:8px;font-size:13px;margin-top:5px;">Copy Annotations</button>
            </div>
        </div>
    </div>

    <!-- Test Overlay (nutzt den gameCanvas direkt) -->
    <div id="testOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#0a0a0f;">
        <div style="position:absolute;top:10px;right:15px;color:#e74c3c;font-family:monospace;font-size:14px;cursor:pointer;z-index:10000;background:#1a1a2e;padding:6px 14px;border:1px solid #e74c3c;border-radius:4px;" onclick="stopTest()">ESC — Back to Editor</div>
        <div style="position:absolute;top:10px;left:15px;color:#f1c40f;font-family:monospace;font-size:13px;z-index:10000;" id="testInfo">TEST MODE</div>
    </div>

    <div id="main">
        <div id="toolbar">
            <label>Grid:</label>
            <input type="checkbox" id="showGrid" checked onchange="render()">
            <label>Snap:</label>
            <input type="number" id="snapSize" value="5" style="width:40px;background:#0a0a15;color:#fff;border:1px solid #444;padding:2px 4px;font-family:inherit;" onchange="render()">
            <label>Jump Arc:</label>
            <input type="checkbox" id="showArc" onchange="render()">
            <label style="margin-left:20px;">Zoom:</label>
            <input type="range" id="zoomRange" min="0.5" max="2" step="0.1" value="1" oninput="render()">
            <span id="zoomLabel">1x</span>
        </div>
        <div id="canvasWrap">
            <canvas id="gameCanvas" width="800" height="500"></canvas>
            <div id="coords">Mouse: (0, 0)</div>
            <div id="info"></div>
        </div>
    </div>

    <!-- Stubs -->
    <!-- Stubs BEFORE engine.js (sound.js not loaded, stub is enough) -->
    <script>
        const SFX = { muted:true, ctx:null, musicVol:100, sfxVol:100, init(){}, play(){}, tone(){},

    <script>
        const LEVELS = [];
        const game = { levelData: null, cameraX: 0, cameraY: 0 };

    <script src="js/levels/level02.js"></script>

    <script src="js/levels/level04.js"></script>

    <script src="js/levels/level11.js"></script>
    <script src="js/levels/level12.js"></script>
    <script src="js/levels/level13.js"></script>
    <script src="js/levels/level14.js"></script>
    <script src="js/levels/level15.js"></script>
    <script src="js/levels/level16.js"></script>
    <script src="js/levels/level17.js"></script>
