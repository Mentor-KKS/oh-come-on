<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OH COME ON!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <!-- Landscape Hint (shown on mobile portrait) -->
    <div id="landscapeHint">
        <div class="icon">&#128241;</div>
        <div class="msg">Drehe dein Handy ins Querformat!</div>
    </div>

    <!-- Touch Controls (shown on mobile) -->
    <div id="touchControls">
        <div class="touch-group">
            <div class="touch-btn" id="btnLeft">&#9664;</div>
            <div class="touch-btn" id="btnRight">&#9654;</div>
        </div>
        <div class="touch-btn" id="btnJump">&#9650;</div>
    </div>
    <div id="sharedLevelOverlay" onclick="if(event.target===this) closeSharedLevelOverlay();">
        <div class="shared-level-card">
            <h2>Play Shared Level</h2>
            <p>Paste a shared level code from the community editor. The level opens directly in the game without showing the editor setup.</p>
            <textarea id="sharedLevelCodeInput" spellcheck="false" placeholder="Paste the shared level code here" onkeydown="handleSharedLevelOverlayKeydown(event)"></textarea>
            <div class="shared-level-actions">
                <button type="button" onclick="pasteSharedLevelCode()">Paste Clipboard</button>
                <button type="button" class="primary" onclick="loadSharedLevelFromOverlay()">Play Level</button>
                <button type="button" onclick="closeSharedLevelOverlay()">Cancel</button>
            </div>
            <div id="sharedLevelOverlayError"></div>
            <div class="shared-level-help">Tip: Ctrl+V to paste, Ctrl+Enter to start, ESC to close.</div>
        </div>
    </div>

    <!-- Sound -->
    <script src="js/sound.js"></script>

    <!-- Engine: Config, Input, Utils, Particles, Shake -->
    <script src="js/engine.js"></script>
    <script src="js/mobile.js"></script>

    <!-- Player -->
    <script src="js/player.js"></script>

    <!-- Trap-Klassen -->
    <script src="js/traps.js"></script>

    <!-- Renderer: Platform, Spike, Exit zeichnen -->
    <script src="js/renderer.js"></script>

    <!-- UI: Menu, HUD, Win Screen -->
    <script src="js/ui.js"></script>

    <!-- Multiplayer: Ghost Racing Client -->
    <script src="js/multiplayer.js"></script>

    <!-- Game: Loop, State, Level Management (erstellt LEVELS[]) -->
    <script src="js/game.js"></script>

    <!-- Levels: Jedes Level ist eine eigene Datei -->
    <!-- Neue Level einfach als levelXX.js hinzufügen und hier einbinden -->
    <script src="js/levels/level01.js"></script>
    <script src="js/levels/level02.js"></script>
    <script src="js/levels/level03.js"></script>
    <script src="js/levels/level04.js"></script>
    <script src="js/levels/level05.js"></script>
    <script src="js/levels/level06.js"></script>
    <script src="js/levels/level07.js"></script>
    <script src="js/levels/level08.js"></script>
    <script src="js/levels/level09.js"></script>
    <script src="js/levels/level10.js"></script>
    <script src="js/levels/level11.js"></script>
    <script src="js/levels/level12.js"></script>
    <script src="js/levels/level13.js"></script>
    <script src="js/levels/level14.js"></script>
    <script src="js/levels/level15.js"></script>
    <script src="js/levels/level16.js"></script>
    <script src="js/levels/level17.js"></script>
    <script src="js/levels/level18.js"></script>
    <!-- Level 19-22: Coming Soon (in Arbeit) -->
    <!-- <script src="js/levels/level19.js"></script> -->
    <!-- <script src="js/levels/level20.js"></script> -->
    <!-- <script src="js/levels/level21.js"></script> -->
    <!-- <script src="js/levels/level22.js"></script> -->

    <!-- Community Levels (shown in the Community browser, not in LEVELS) -->
    <script src="js/community/community-levels.js"></script>
</body>
</html>
