<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OH COME ON!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #gameCanvas {
            background: #1a1a2e;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            image-rendering: auto;
        }

        #sharedLevelOverlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(5, 6, 10, 0.86);
            backdrop-filter: blur(4px);
            z-index: 20;
        }

        #sharedLevelOverlay.open {
            display: flex;
        }

        .shared-level-card {
            width: min(640px, 92vw);
            padding: 24px;
            background: linear-gradient(180deg, #171926 0%, #11131d 100%);
            border: 1px solid #31374c;
            border-radius: 10px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
            color: #fff;
        }

        .shared-level-card h2 {
            margin-bottom: 8px;
            font-size: 26px;
            color: #f1f1f1;
        }

        .shared-level-card p {
            margin-bottom: 14px;
            color: #8f95ab;
            line-height: 1.45;
            font-size: 14px;
        }

        #sharedLevelCodeInput {
            width: 100%;
            min-height: 190px;
            resize: vertical;
            padding: 12px;
            border: 1px solid #3a4157;
            border-radius: 8px;
            outline: none;
            background: #0c0e16;
            color: #eef2ff;
            font: 13px/1.45 "Courier New", monospace;
        }

        #sharedLevelCodeInput:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.14);
        }

        .shared-level-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .shared-level-actions button {
            padding: 10px 14px;
            border: 1px solid #3a4157;
            border-radius: 8px;
            background: #181c2b;
            color: #fff;
            cursor: pointer;
            font: 14px "Courier New", monospace;
        }

        .shared-level-actions button.primary {
            background: #2ecc71;
            border-color: #25aa5f;
            color: #08110c;
            font-weight: bold;
        }

        .shared-level-actions button:hover {
            filter: brightness(1.08);
        }

        #sharedLevelOverlayError {
            min-height: 18px;
            margin-top: 12px;
            color: #ff8f8f;
            font-size: 13px;
        }

        .shared-level-help {
            margin-top: 10px;
            color: #6e748b;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="sharedLevelOverlay" onclick="if(event.target===this) closeSharedLevelOverlay();">
        <div class="shared-level-card">
            <h2>Play Shared Level</h2>
            <p>Paste a shared level code from the community editor. The level opens directly in the game without showing the editor setup.</p>
            <textarea id="sharedLevelCodeInput" spellcheck="false" placeholder="Paste the shared level code here" onkeydown="handleSharedLevelOverlayKeydown(event)"></textarea>
            <div class="shared-level-actions">
                <button type="button" onclick="pasteSharedLevelCode()">Paste Clipboard</button>
                <button type="button" class="primary" onclick="loadSharedLevelFromOverlay()">Play Level</button>
                <button type="button" onclick="closeSharedLevelOverlay()">Cancel</button>
            </div>
            <div id="sharedLevelOverlayError"></div>
            <div class="shared-level-help">Tip: Ctrl+V to paste, Ctrl+Enter to start, ESC to close.</div>
        </div>
    </div>

    <!-- Sound -->
    <script src="js/sound.js"></script>

    <!-- Engine: Config, Input, Utils, Particles, Shake -->
    <script src="js/engine.js"></script>

    <!-- Player -->
    <script src="js/player.js"></script>

    <!-- Trap-Klassen -->
    <script src="js/traps.js"></script>

    <!-- Renderer: Platform, Spike, Exit zeichnen -->
    <script src="js/renderer.js"></script>

    <!-- UI: Menu, HUD, Win Screen -->
    <script src="js/ui.js"></script>

    <!-- Multiplayer: Ghost Racing Client -->
    <script src="js/multiplayer.js"></script>

    <!-- Game: Loop, State, Level Management (erstellt LEVELS[]) -->
    <script src="js/game.js"></script>

    <!-- Levels: Jedes Level ist eine eigene Datei -->
    <!-- Neue Level einfach als levelXX.js hinzufügen und hier einbinden -->
    <script src="js/levels/level01.js"></script>
    <script src="js/levels/level02.js"></script>
    <script src="js/levels/level03.js"></script>
    <script src="js/levels/level04.js"></script>
    <script src="js/levels/level05.js"></script>
    <script src="js/levels/level06.js"></script>
    <script src="js/levels/level07.js"></script>
    <script src="js/levels/level08.js"></script>
    <script src="js/levels/level09.js"></script>
    <script src="js/levels/level10.js"></script>
    <script src="js/levels/level11.js"></script>
    <script src="js/levels/level12.js"></script>
    <script src="js/levels/level13.js"></script>
    <script src="js/levels/level14.js"></script>
    <script src="js/levels/level15.js"></script>
    <script src="js/levels/level16.js"></script>
    <!-- Level 17-20: Coming Soon (in Arbeit) -->
    <!-- <script src="js/levels/level17.js"></script> -->
    <!-- <script src="js/levels/level18.js"></script> -->
    <!-- <script src="js/levels/level19.js"></script> -->
    <!-- <script src="js/levels/level20.js"></script> -->
</body>
</html>
